[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "openpyxl_rust"
requires-python = ">=3.9"
version = "0.1.0"
description = "Rust-backed openpyxl-compatible Excel writer"

[tool.maturin]
features = ["pyo3/extension-module"]
python-source = "python"
module-name = "openpyxl_rust._openpyxl_rust"
