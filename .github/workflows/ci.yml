name: CI

on:
  push:
    branches: [main, dev, "feat/**", "hotfix/**"]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:

  # ── Python lint & format ───────────────────────────────────────
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.6"

      - name: Format check
        run: uvx ruff format --check python/ tests/

      - name: Lint check
        run: uvx ruff check python/ tests/

  # ── Rust lint & format ─────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.6"

      - name: Create venv for PyO3
        run: uv venv --python 3.12

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Lint check
        run: |
          source .venv/bin/activate
          cargo clippy -- -D warnings

  # ── Cargo deny (license + advisory audit) ──────────────────────
  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ── MSRV check ─────────────────────────────────────────────────
  msrv:
    name: MSRV (Rust 1.74)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.6"

      - name: Create venv for PyO3
        run: uv venv --python 3.12

      - uses: dtolnay/rust-toolchain@1.74

      - uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: |
          source .venv/bin/activate
          cargo check

  # ── Test matrix ────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [ruff, clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.13", "3.14"]
        exclude:
          # Keep matrix manageable — test edges + latest on all OS
          - os: macos-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.6"
          enable-cache: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: uv venv --python ${{ matrix.python-version }} && uv pip install maturin pytest openpyxl

      - name: Build extension
        run: uv run maturin develop --release

      - name: Run tests
        run: uv run pytest tests/ -q
